name: Buffalo Trace Sunday Report

# Primary trigger: repository_dispatch (type: sunday-report-trigger) fired by
# the Claude dispatcher task at 8:00 AM EST — starts within seconds.
# Backup trigger: cron at 7:00 AM EST (12:00 UTC) — fires 30–90 min late but
# guarantees the run even if Claude is down. Gift shop opens 11am EST;
# 240-min poll window covers 7:00 AM through 11:00 AM with buffer.
# Indiana stays on EST year-round — no DST adjustment needed.

on:
  repository_dispatch:
    types: [sunday-report-trigger]
  schedule:
    - cron: '0 12 * * 0'   # 12:00 UTC = 7:00 AM EST backup, Sunday only
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — skip email, SMS, and git push'
        required: false
        default: 'false'
        type: boolean
      max_poll_minutes:
        description: 'Max scraper poll minutes (use 10 for quick tests)'
        required: false
        default: '240'
        type: string

# Prevent duplicate concurrent runs when both dispatch and cron fire same day.
concurrency:
  group: sunday-report-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # needed to git push tracker_data.json + data.json

jobs:
  sunday-report:
    runs-on: ubuntu-latest
    timeout-minutes: 330   # 5.5 hours — covers 240-min poll + overhead

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      - name: Run Sunday report pipeline
        env:
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          REPORT_FROM_EMAIL:    "Buffalo Trace Daily <drops@buffalotracebottledrops.com>"
          REPORT_TO_EMAIL:      "brianwulff@yahoo.com"
          TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER:   ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER:     ${{ secrets.TWILIO_TO_NUMBER }}
          TWILIO_TO_NUMBERS:    ${{ secrets.TWILIO_TO_NUMBERS }}
          TWILIO_ENABLED:       ${{ secrets.TWILIO_ENABLED }}
          PUSHOVER_TOKEN:       ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER:        ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_DEVICE:      "BriansPhone"
          DRY_RUN:              ${{ github.event.client_payload.dry_run || inputs.dry_run || 'false' }}
        run: >
          python scripts/run_daily.py
          --max-poll-minutes ${{ github.event.client_payload.max_poll_minutes || inputs.max_poll_minutes || '240' }}
