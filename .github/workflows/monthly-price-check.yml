name: Buffalo Trace Monthly Price Check

on:
  repository_dispatch:
    types: [monthly-price-check-trigger]
  schedule:
    - cron: '0 14 1 * *'   # 14:00 UTC = 9:00 AM EST, 1st of each month
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — skip email, SMS, and git push'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: monthly-price-check-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monthly-price-check:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 2 hours — price scraping may retry

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      - name: Run monthly price check
        env:
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          REPORT_FROM_EMAIL:    "Buffalo Trace Daily <drops@buffalotracebottledrops.com>"
          REPORT_TO_EMAIL:      "brianwulff@yahoo.com"
          TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER:   ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER:     ${{ secrets.TWILIO_TO_NUMBER }}
          TWILIO_ENABLED:       ${{ secrets.TWILIO_ENABLED }}
          DRY_RUN:              ${{ github.event.client_payload.dry_run || inputs.dry_run || 'false' }}
        run: python scripts/run_monthly_price_check.py
