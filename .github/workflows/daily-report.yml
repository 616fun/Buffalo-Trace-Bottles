name: Buffalo Trace Daily Report (Mon–Sat)

# Primary trigger: repository_dispatch fired by the Claude dispatcher task at
# 7:00 AM EST — starts the pipeline within seconds of Claude's fire.
# Backup trigger: cron at 6:00 AM EST (11:00 UTC) — fires 30–90 min late due to
# GitHub scheduling, but guarantees the pipeline runs even if Claude is down.
# The idempotency guard in run_daily.py ensures only one run completes per day
# if both triggers fire.
# Indiana stays on EST year-round — no DST adjustment needed.

on:
  repository_dispatch:
    types: [daily-report-trigger]
  schedule:
    - cron: '0 11 * * 1-6'   # 11:00 UTC = 6:00 AM EST backup, Mon–Sat
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — skip email, SMS, and git push'
        required: false
        default: 'false'
        type: boolean
      max_poll_minutes:
        description: 'Max scraper poll minutes (use 10 for quick tests)'
        required: false
        default: '240'
        type: string

# Prevent duplicate concurrent runs when both dispatch and cron fire same day.
# cancel-in-progress: false — let the first run finish; the second hits the
# idempotency guard and exits cleanly in ~1 second.
concurrency:
  group: daily-report-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # needed to git push tracker_data.json + data.json

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 330   # 5.5 hours — covers 240-min poll + overhead

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # persist-credentials: true is the default; git push will use
          # the GITHUB_TOKEN automatically (no extra secret needed)
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      - name: Run daily report pipeline
        env:
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          REPORT_FROM_EMAIL:    "Buffalo Trace Daily <drops@buffalotracebottledrops.com>"
          REPORT_TO_EMAIL:      "brianwulff@yahoo.com"
          TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER:   ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER:     ${{ secrets.TWILIO_TO_NUMBER }}
          TWILIO_ENABLED:       ${{ secrets.TWILIO_ENABLED }}
          DRY_RUN:              ${{ github.event.client_payload.dry_run || inputs.dry_run || 'false' }}
        run: >
          python scripts/run_daily.py
          --max-poll-minutes ${{ github.event.client_payload.max_poll_minutes || inputs.max_poll_minutes || '240' }}
