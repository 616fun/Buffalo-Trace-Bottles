name: Buffalo Trace Weekly QC

on:
  repository_dispatch:
    types: [weekly-qc-trigger]
  schedule:
    - cron: '0 18 * * 0'   # 18:00 UTC = 1:00 PM EST, Sunday only
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — skip email, SMS, and git push'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: weekly-qc-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  weekly-qc:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      - name: Run weekly QC
        env:
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          REPORT_FROM_EMAIL:    "Buffalo Trace Daily <drops@buffalotracebottledrops.com>"
          REPORT_TO_EMAIL:      "brianwulff@yahoo.com"
          TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER:   ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER:     ${{ secrets.TWILIO_TO_NUMBER }}
          TWILIO_TO_NUMBERS:    ${{ secrets.TWILIO_TO_NUMBERS }}
          TWILIO_ENABLED:       ${{ secrets.TWILIO_ENABLED }}
          PUSHOVER_TOKEN:       ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER:        ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_DEVICE:      "BriansPhone"
          DRY_RUN:              ${{ github.event.client_payload.dry_run || inputs.dry_run || 'false' }}
        run: python scripts/run_weekly_qc.py
